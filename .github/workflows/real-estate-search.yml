name: Real Estate Agent Search

# Runs the private real estate agent in real-estate-agent/ on a schedule.
# See real-estate-agent/README.md for setup (config.yaml, secrets).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: real-estate-agent

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: real-estate-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # database.sqlite is how the agent remembers which listings it has
      # already notified about. It is cached (not committed) across runs so
      # the schedule doesn't spam the repo history with a commit every 15
      # minutes. Old cache entries expire automatically after 7 days of
      # disuse.
      - name: Restore known-listings database
        uses: actions/cache@v4
        with:
          path: real-estate-agent/database.sqlite
          key: real-estate-db-${{ github.run_id }}
          restore-keys: |
            real-estate-db-

      - name: Run agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: real-estate-agent/agent.log
          retention-days: 14
          if-no-files-found: ignore
