# Private Real Estate Agent - configuration.
#
# Secrets (Telegram bot token, chat ID, SMTP credentials) do NOT go here -
# they are read from environment variables / GitHub Actions secrets instead
# (see README.md), so this file can be safely committed to git.

search:
  # Property types you're interested in. Purely informational for now -
  # actual filtering happens via the criteria below - but future providers
  # can use it to pick the right site-specific category.
  type:
    - house
    - apartment

  buy: true
  rent: false

  # Each source is fetched independently; a broken/unreachable one never
  # stops the others (see main.py). Set enabled: false to disable a source
  # without deleting its configuration.
  #
  # search_url: paste the URL of a search you configured yourself on the
  # provider's website (with whatever filters you like there) - the agent
  # re-fetches this URL every run and applies the criteria below on top.
  sources:
    immobilienscout:
      enabled: true
      search_url: "https://www.immobilienscout24.de/Suche/radius/haus-kaufen?centerofsearchaddress=Landsberg+am+Lech+%28Kreis%29%3B%3B%3B%3B%3BLandsberg+am+Lech%3B&energyefficiencyclasses=a%2Cb%2Cc%2Cd%2Ca_plus&geocoordinates=48.04788%3B10.88248%3B35.0&enteredFrom=result_list"
    immowelt:
      enabled: true
      search_url: "https://www.immowelt.de/classified-search?distributionTypes=Buy,Buy_Auction&energyCertificate=A_PLUS,A,B,C,D&estateTypes=House&locations=AD06DE237&priceMax=700000&projectTypes=Resale&m=homepage_new_search_classified_search_result"
    kleinanzeigen:
      enabled: true
      search_url: ""

location:
  center: Augsburg
  radius: 40 # km

price:
  min: 0
  max: 650000

living_area:
  min: 130 # m²

rooms:
  min: 5

plot:
  min: 500 # m²

keywords:
  - garage
  - garten

exclude:
  - erbpacht

notify:
  telegram:
    enabled: true
  email:
    enabled: false

# How long to wait between HTTP requests to the same source, in seconds.
# Kept conservative since the agent already only runs every 15 minutes.
request_delay_seconds: 2
